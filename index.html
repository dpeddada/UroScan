<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UroScan</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js" defer></script>
</head>
<body>

<div class="top-right-status">
  <div id="deviceStatus">Device: Not Connected</div>
  <div id="bleStatus">Bluetooth: Disconnected</div>
  <button class="connect-btn" id="connectBtn">Connect BLE</button>
  <button class="demo-btn" id="demoBtn">Use Demo Data</button>
</div>

<section id="homeScreen" class="screen active">
  <div class="home-screen-layout">
    <div class="home-canvas">

      <div class="title-panel">
        <h1 class="page-title">UroScan</h1>
      </div>

      <div class="home-button-row">
        <button class="home-btn large" id="flowBtn">Flow<br>Rate</button>
        <button class="home-btn small" id="volumeBtn">Volume / Graph</button>
        <button class="home-btn large" id="specBtn">Color</button>
        <button class="home-btn large" id="turbBtn">Turbidity</button>
      </div>

    </div>
  </div>
</section>

<section id="loadScreen" class="screen">
  <div class="page-wrap">
    <button class="back-btn" data-back="homeScreen">← Back</button>
    <h1 class="page-title">Flow Rate</h1>
    <canvas id="loadChart"></canvas>
  </div>
</section>

<section id="volumeScreen" class="screen">
  <div class="page-wrap">
    <button class="back-btn" data-back="homeScreen">← Back</button>
    <h1 class="page-title">Volume</h1>
    <canvas id="volumeChart"></canvas>
  </div>
</section>

<section id="turbidityScreen" class="screen">
  <div class="page-wrap">
    <button class="back-btn" data-back="homeScreen">← Back</button>
    <h1 class="page-title">Turbidity</h1>
    <canvas id="turbidityChart"></canvas>
  </div>
</section>

<section id="spectrometerScreen" class="screen">
  <div class="page-wrap">
    <button class="back-btn" data-back="homeScreen">← Back</button>
    <h1 class="page-title">Color</h1>
    <canvas id="spectrometerChart"></canvas>
  </div>
</section>

</body>
</html>
